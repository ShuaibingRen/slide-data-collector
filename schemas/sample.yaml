name: Sample Metadata
version: "2.0"
description: "样本元数据 / Sample Metadata — 由制备端填写"
fields:
  - name: biospecimen_id
    type: string
    required: true
    description: "样本唯一标识符 / Unique biospecimen identifier"
    example: "HS-20260101-001"

  - name: parent_id
    type: string
    required: true
    description: "样本来源参与者的唯一标识符 / Participant identifier this sample originates from"
    example: "PAT-2026-0001"

  - name: tissue_harvest_site
    type: string
    required: true
    description: "样本来源组织 / Tissue harvest site"
    example: "Breast"

  - name: tissue_tumor_status
    type: enum
    required: true
    values:
      - Primary
      - Local Recurrence
      - Distant Recurrence
      - Metastatic
    description: "样本肿瘤状态 / Tumor status of the sample"
    example: "Primary"

  - name: acquisition_method_type
    type: enum
    required: false
    values:
      - resection
      - biopsy
      - other
      - unk
    description: "样本的获取方法 / Method used to acquire the sample"
    example: "resection"

  - name: preservation_method
    type: enum
    required: false
    values:
      - FFPE
      - Frozen
    description: "样本保存方法 / Sample preservation method"
    example: "FFPE"
