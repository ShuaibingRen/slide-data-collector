name: Sample Metadata
version: "1.0"
description: "样本元数据 / Sample Metadata — 由制备端填写"
fields:
  - name: sample_id
    type: string
    required: true
    description: "唯一样本标识符 / Unique sample identifier"
    example: "SPL-2024-001-A"

  - name: donor_id
    type: string
    required: true
    description: "关联供体 ID / Associated donor identifier"
    example: "DNR-2024-001"

  - name: stain_type
    type: enum
    required: true
    values:
      - "H&E"
      - IHC
      - IF
      - mIF
      - FISH
      - Other
    description: "染色类型 / Stain type"
    example: "H&E"

  - name: section_thickness_um
    type: number
    required: false
    description: "切片厚度 (μm) / Section thickness in micrometers"
    example: "5"

  - name: antibody_panel
    type: string
    required: false
    description: "抗体 panel (逗号分隔) / Antibody panel (comma-separated)"
    example: "CD3,CD8,PD-L1,DAPI"

  - name: preparation_date
    type: date
    required: true
    description: "制备日期 / Preparation date (YYYY-MM-DD)"
    example: "2024-01-20"

  - name: operator
    type: string
    required: false
    description: "操作人 / Operator name"
    example: "Zhang Wei"

  - name: notes
    type: string
    required: false
    description: "备注 / Notes"
    example: ""
