name: Imaging Metadata
version: "2.0"
description: "成像元数据 / Imaging Metadata — 由 CRO 填写，随 S3 图像交付"
fields:
  - name: data_file_id
    type: string
    required: true
    description: "数据文件唯一标识符 / Unique data file identifier"
    example: "DAT-20260101-0001"

  - name: filename
    type: string
    required: true
    description: "文件名或目录名，推荐由字母、数字、下划线或破折号组成。对于目录型格式（如 vsi）可填入目录名，整个目录对应一条记录 / Filename or directory name. For directory-based formats (e.g., vsi), enter the directory name; one directory = one record."
    example: "15-35626"

  - name: file_format
    type: string
    required: true
    description: "文件格式。对于目录型格式填写 dir（如 vsi/est），单文件格式填写具体后缀（如 ometiff, tif, zip） / File format. Use 'dir' for directory-based formats (e.g., vsi/est), or the file extension for single-file formats (e.g., ometiff, tif, zip)."
    example: "dir"

  - name: parent_biospecimen_id
    type: string
    required: true
    description: "原始生物样本标识符 / Parent biospecimen identifier"
    example: "HS-20260101-001"

  - name: data_level
    type: enum
    required: true
    values:
      - level1
      - level2
    description: "数据层级：level1（原始成像数据），level2（光照校正、拼接、配准后的单一文件，如OME-TIFF） / Data level"
    example: "level2"

  - name: s3_path
    type: string
    required: true
    description: "S3 存储路径 / S3 storage path"
    example: "s3://cartabio-data-receiver/huabio/15-35626/"

  - name: image_assay_type
    type: enum
    required: false
    values:
      - safe
      - h&e
      - mihc
      - mxif
    description: "成像技术 / Image assay type"
    example: "mxif"

  - name: channel_metadata_filename
    type: string
    required: false
    description: "通道元信息文件名 / Channel metadata filename"
    example: "channel_cycle_marker.csv"

  - name: microscope
    type: string
    required: false
    description: "显微镜制造商和型号 / Microscope manufacturer and model"
    example: "Olympus VS200"

  - name: software
    type: string
    required: false
    description: "图像采集和预处理软件 / Image acquisition and preprocessing software"
    example: "Olympus VS200 ASW v3.4.1"

  - name: objective
    type: string
    required: false
    description: "物镜名称或描述 / Objective lens name or description"
    example: "UPlanXApo"

  - name: nominal_magnification
    type: string
    required: false
    description: "标称放大倍率 / Nominal magnification"
    example: "20X"

  - name: lensNA
    type: number
    required: false
    description: "数值孔径 / Numerical aperture"
    example: "0.8"

  - name: PhysicalSizeX
    type: number
    required: false
    description: "像素在X轴方向上的物理尺寸 / Physical size per pixel in X direction"
    example: "0.325"

  - name: PhysicalSizeXUnit
    type: string
    required: false
    description: "像素在X轴方向上的物理尺寸单位 / Unit of PhysicalSizeX"
    example: "μm"

  - name: PhysicalSizeY
    type: number
    required: false
    description: "像素在Y轴方向上的物理尺寸 / Physical size per pixel in Y direction"
    example: "0.325"

  - name: PhysicalSizeYUnit
    type: string
    required: false
    description: "像素在Y轴方向上的物理尺寸单位 / Unit of PhysicalSizeY"
    example: "μm"

  - name: Type
    type: string
    required: false
    description: "图像位深 / Image bit depth / pixel type"
    example: "int16"

  - name: Overlap
    type: number
    required: false
    description: "相邻FOV之间的重叠比例 / Overlap ratio between adjacent FOVs"
    example: "0.2"
